                                else enemies.push(eData);
                            }
                            enemies = enemies.filter(e => data.enemies.find(ed => ed.id === e.id));
                        }
                        break;
                    case 'playerLeft':
                        delete state.remotePlayers[data.playerId];
                        break;
                }
            }

            function syncPlayerState() {
                const pState = {
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                    health: player.health,
                    armor: player.armor,
                    alive: player.alive,
                    currentWeapon: player.currentWeapon,
                    ownedWeapons: player.ownedWeapons,
                    ammoInMag: player.ammoInMag,
                    reserveAmmo: player.reserveAmmo,
                    reloading: player.reloading,
                    damageFlash: state.damageFlash,
                };
                sendNetworkMessage({ type: 'playerState', playerId: state.playerId, state: pState, label: 'YOU' });
            }

            function broadcastBullet(bulletData) {
                sendNetworkMessage({ type: 'bullet', bullet: bulletData });
            }

            function broadcastEnemyState(enemy) {
                sendNetworkMessage({ type: 'enemyState', enemy: { ...enemy } });
            }

            function broadcastEnemyDeath(enemyId) {
                sendNetworkMessage({ type: 'enemyDeath', enemyId: enemyId });
            }

            function broadcastGameState() {
                sendNetworkMessage({
                    type: 'gameState',
                    phase: state.phase,
                    round: state.round,
                    buyTimer: state.buyTimer,
                    killsThisRound: state.killsThisRound,
                    money: state.money,
                    enemies: enemies.map(e => ({ ...e })),
                });
            }

            function broadcastHostState() {
                if (!state.isHost) return;
                sendNetworkMessage({
                    type: 'hostState',
                    enemies: enemies.map(e => ({ id: e.id, x: e.x, y: e.y, angle: e.angle, health: e.health, alive: e
                            .alive, state: e.state, damageFlash: e.damageFlash })),
                });
            }

            function sendNetworkMessage(data) {
                if (broadcastChannel && state.multiplayerConnected) {
                    try { broadcastChannel.postMessage(data); } catch (e) {}
                }
                if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
                    try { wsConnection.send(JSON.stringify(data)); } catch (e) {}
                }
            }

            function updateStatusText(msg) {
                document.getElementById('status-text').textContent = msg;
            }

            function initGame() {
                player.reset();
                player.health = 1000000;
                player.armor = 100000000;
                player.alive = true;
                player.ownedWeapons = ['knife', 'usp'];
                player.currentWeapon = 'usp';
                player.ammoInMag = WEAPONS.usp.ammo;
                player.reserveAmmo = WEAPONS.usp.reserve;
                state.money = 80000;
                state.round = 1;
                state.killsThisRound = 0;
                state.headshotsThisRound = 0;
                state.phase = 'playing';
                state.buyTimer = 60;
                state.winTimer = 0;
                state.loseTimer = 0;
                state.shakeAmount = 0;
                state.damageFlash = 0;
                state.remotePlayers = {};
                bullets = [];
                muzzleFlashes = [];
                particles = [];
                enemies = [];
                if (state.isHost || state.gameMode === 'solo') spawnEnemies();
                closeBuyMenu();
                camera.x = player.x - W / 2;
                camera.y = player.y - H / 2;
            }

            const menuOverlay = document.getElementById('menu-overlay');
            const btnSolo = document.getElementById('btn-solo');
            const btnHost = document.getElementById('btn-host');
            const btnJoin = document.getElementById('btn-join');
            const btnJoinConfirm = document.getElementById('btn-join-confirm');
            const btnBack = document.getElementById('btn-back');
            const roomInput = document.getElementById('room-input');
            const statusText = document.getElementById('status-text');

            function showMenuOptions(showJoin) {
                btnSolo.style.display = showJoin ? 'none' : 'block';
                btnHost.style.display = showJoin ? 'none' : 'block';
                btnJoin.style.display = showJoin ? 'none' : 'block';
                roomInput.style.display = showJoin ? 'block' : 'none';
                btnJoinConfirm.style.display = showJoin ? 'block' : 'none';
                btnBack.style.display = showJoin ? 'block' : 'none';
                statusText.textContent = '';
            }

            btnSolo.addEventListener('click', () => {
                initAudio();
                state.gameMode = 'solo';
                state.isHost = false;
                state.playerId = 'p1';
                state.multiplayerConnected = false;
                if (broadcastChannel) { broadcastChannel.close();
                    broadcastChannel = null; }
                if (wsConnection) { wsConnection.close();
                    wsConnection = null; }
                menuOverlay.style.display = 'none';
                initGame();
                gameRunning = true;
                document.body.style.cursor = 'none';
            });

            btnHost.addEventListener('click', () => {
                initAudio();
                const roomCode = Math.random().toString(36).substr(2, 8).toUpperCase();
                state.gameMode = 'multi';
                state.isHost = true;
                state.playerId = 'host_' + Math.random().toString(36).substr(2, 6);
                state.multiplayerConnected = false;
                setupBroadcastChannel(roomCode);
                setupWebSocket(roomCode, true);
                menuOverlay.style.display = 'none';
                updateStatusText('Room: ' + roomCode + ' (share this code)');
                initGame();
                gameRunning = true;
                document.body.style.cursor = 'none';
                if (syncInterval) clearInterval(syncInterval);
                syncInterval = setInterval(() => {
                    syncPlayerState();
                    if (state.isHost) broadcastHostState();
                }, 50);
            });

            btnJoin.addEventListener('click', () => {
                showMenuOptions(true);
                roomInput.focus();
                updateStatusText('Enter room code');
            });

            btnJoinConfirm.addEventListener('click', () => {
                const code = roomInput.value.trim();
                if (!code) { updateStatusText('Please enter a room code'); return; }
                initAudio();
                state.gameMode = 'multi';
                state.isHost = false;
                state.playerId = 'client_' + Math.random().toString(36).substr(2, 6);
                state.multiplayerConnected = false;
                setupBroadcastChannel(code);
                setupWebSocket(code, false);
                menuOverlay.style.display = 'none';
                updateStatusText('Joined room: ' + code);
                initGame();
                gameRunning = true;
                document.body.style.cursor = 'none';
                if (syncInterval) clearInterval(syncInterval);
                syncInterval = setInterval(() => {
                    syncPlayerState();
                }, 50);
            });

            btnBack.addEventListener('click', () => {
                showMenuOptions(false);
                updateStatusText('');
                roomInput.value = '';
            });

            showMenuOptions(false);
            menuOverlay.style.display = 'flex';
            document.body.style.cursor = 'default';
            resizeCanvas();
            camera.x = player.x - W / 2;
            camera.y = player.y - H / 2;
            requestAnimationFrame(gameLoop);

            window.addEventListener('resize', () => {
                resizeCanvas();
                camera.x = Math.max(0, Math.min(MAP_W - W, camera.targetX));
                camera.y = Math.max(0, Math.min(MAP_H - H, camera.targetY));
            });

            console.log('Tactical Shooter ready - Solo / Multiplayer (BroadcastChannel + WebSocket)');
            console.log('WASD/ZQSD: Move | Mouse: Aim | Left Click: Shoot | R: Reload | B: Buy Menu | 1-6: Switch Weapon');
            console.log('Multiplayer: Host a game and share the room code, or join with a code');
        })();
    </script>
</body>
</html>
